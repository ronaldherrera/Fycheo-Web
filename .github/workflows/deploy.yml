name: Deploy Fycheo Web
on:
  push:
    branches:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🎉 Deploy Web
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📝 Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" >> .env

      - name: 🔨 Build Project
        run: npm run build

      - name: 📂 Sync files (SFTP)
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASS }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.HOSTINGER_USER }}","$SFTP_PASS" \
            sftp://${{ secrets.HOSTINGER_HOST }} \
            -e "set sftp:auto-confirm yes; set net:timeout 30; mirror --reverse --delete --verbose ./dist/ ${{ secrets.HOSTINGER_TARGET }}; bye"
